name: Deploy to Firebase Hosting (live)

# Runs when code lands on main — i.e. when a PR is approved & merged.
on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        # Firebase web config values are public (shipped in the client bundle),
        # so they are safe to keep here for the production build.
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCzkaAC3DcSszANgQ7l96FdciCo5JdSYmI
          VITE_FIREBASE_AUTH_DOMAIN: soccer-checkin-1e6f8.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: soccer-checkin-1e6f8
          VITE_FIREBASE_STORAGE_BUCKET: soccer-checkin-1e6f8.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "688866673022"
          VITE_FIREBASE_APP_ID: "1:688866673022:web:d4ba86e72160b7b8c8732f"
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: soccer-checkin-1e6f8
